# Wormhole Gas Sites
# Source: EVE University Wiki (individual site pages, verified April 2026)
# NPC spawn: ~15-20 minutes after warp-in (random variance, same for all sites)
#
# Class distribution (from EVE Uni Wormhole_sites page):
#   Perimeter Reservoirs: C1-C4
#   Frontier Reservoirs: C3-C6
#   Core Reservoirs: C5, C6, Shattered only

sites:
